<section class="password-page">
  <div class="page-title">
    <p>Functionality 8</p>
    <h1>Change Password</h1>
  </div>

  <form class="password-card" #passwordForm="ngForm" (ngSubmit)="changePassword()">
    <label>
      Email
      <input
        type="email"
        name="email"
        [(ngModel)]="changePasswordRequest.email"
        required
        email
        maxlength="150"
        placeholder="Enter your registered email">
    </label>

    <label>
      Old Password
      <input
        type="password"
        name="oldPassword"
        [(ngModel)]="changePasswordRequest.oldPassword"
        required
        placeholder="Enter old password">
    </label>

    <label>
      New Password
      <input
        type="password"
        name="newPassword"
        [(ngModel)]="changePasswordRequest.newPassword"
        required
        minlength="6"
        maxlength="100"
        placeholder="Enter new password">
    </label>

    <label>
      Confirm New Password
      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        required
        minlength="6"
        maxlength="100"
        placeholder="Confirm new password">
    </label>

    <div class="actions">
      <button type="submit" [disabled]="passwordForm.invalid || isSaving">
        {{ isSaving ? 'Changing...' : 'Change Password' }}
      </button>
    </div>

    <p class="message success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>
</section>
