<section class="account-page">
  <div class="page-title">
    <p>Functionality 6</p>
    <h1>Create Account</h1>
  </div>

  <form class="account-card" #registerForm="ngForm" (ngSubmit)="registerCustomer()">
    <div class="form-grid">
      <label>
        Title
        <select name="title" [(ngModel)]="customer.title" required>
          <option value="">Select title</option>
          <option *ngFor="let title of titles" [value]="title">{{ title }}</option>
        </select>
      </label>

      <label>
        First Name
        <input type="text" name="firstName" [(ngModel)]="customer.firstName" required maxlength="100">
      </label>

      <label>
        Last Name
        <input type="text" name="lastName" [(ngModel)]="customer.lastName" required maxlength="100">
      </label>

      <label>
        Email
        <input type="email" name="email" [(ngModel)]="customer.email" required maxlength="150" email>
      </label>

      <label>
        Password
        <input type="password" name="password" [(ngModel)]="customer.password" required minlength="6" maxlength="100">
      </label>

      <label>
        Confirm Password
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="6" maxlength="100">
      </label>

      <label>
        Phone Number
        <input type="tel" name="phoneNumber" [(ngModel)]="customer.phoneNumber" required pattern="[0-9]{10}" placeholder="9876543210">
      </label>

      <label>
        City
        <input type="text" name="city" [(ngModel)]="customer.city" required maxlength="100">
      </label>

      <label>
        Country
        <select name="country" [(ngModel)]="customer.country" required>
          <option value="">Select country</option>
          <option *ngFor="let country of countries" [value]="country">{{ country }}</option>
        </select>
      </label>
    </div>

    <label class="terms-row">
      <input type="checkbox" name="acceptTerms" [(ngModel)]="acceptTerms">
      <span>I have read terms and conditions</span>
    </label>

    <div class="actions">
      <button type="submit" [disabled]="registerForm.invalid || isSaving">
        {{ isSaving ? 'Creating...' : 'Create New Account' }}
      </button>
    </div>

    <p class="message success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>
</section>
