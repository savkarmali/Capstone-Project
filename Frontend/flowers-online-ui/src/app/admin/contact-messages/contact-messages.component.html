<section class="messages-page">
  <div class="page-heading">
    <div>
      <p class="eyebrow">Functionality 16</p>
      <h1>Contact Messages</h1>
      <p class="subtitle">View messages sent by customers from the Contact page.</p>
    </div>

    <button type="button" (click)="loadMessages()" [disabled]="isLoading">
      {{ isLoading ? 'Loading...' : 'Refresh' }}
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert error">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && messages.length === 0" class="empty-state">
    No contact messages found.
  </div>

  <div *ngIf="messages.length > 0" class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Message</th>
          <th>Submitted On</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let message of messages">
          <td>{{ message.id }}</td>
          <td>{{ message.name }}</td>
          <td>{{ message.email }}</td>
          <td class="message-text">{{ message.message }}</td>
          <td>{{ message.createdAt | date: 'medium' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
